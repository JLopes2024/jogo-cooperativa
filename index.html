  <link rel="stylesheet" href="style.css">

<body>

  <div id="login">
    <h2>Crie sua cooperativa</h2>

    <input type="text" id="nome" placeholder="Seu nome">

    <select id="tipo">
      <option>Transporte</option>
      <option>Saúde</option>
      <option>Agropecuário</option>
      <option>Financeira</option>
      <option>Consumo</option>
      <option>Infraestrutura</option>
      <option>Trabalho e Serviços</option>
    </select>

    <button onclick="criarCooperativa()">Entrar</button>
  </div>

  <div id="jogo" style="display:none;">
    <h2 id="titulo"></h2>
    <p id="dinheiro"></p>

    <h3>🟢 Jogadores Online</h3>
    <div id="online"></div>

    <h3>🏆 Ranking</h3>
    <div id="ranking"></div>

    <h3>🤝 Cooperativas</h3>
    <div id="lista"></div>

    <h3>📢 Eventos</h3>
    <div id="eventos"></div>
  </div>
