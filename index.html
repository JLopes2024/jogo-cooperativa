<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cooperativas Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="container">
  <h2>Entrar no jogo</h2>

  <input id="nome" placeholder="Nome"><br>
  <input id="email" placeholder="Email"><br>
  <input id="senha" type="password" placeholder="Senha"><br>

  <select id="tipo">
    <option>Transporte</option>
    <option>Saúde</option>
    <option>Agropecuário</option>
    <option>Financeira</option>
    <option>Consumo</option>
    <option>Infraestrutura</option>
    <option>Trabalho e Serviços</option>
  </select>

  <button onclick="registrar()">Registrar</button>
  <button onclick="login()">Login</button>
</div>

<!-- JOGO -->
<div id="jogo" class="container" style="display:none;">

  <h2 id="titulo"></h2>
  <div id="dinheiro"></div>

  <h3>🤝 Cooperativas</h3>
  <div id="lista"></div>

  <h3>🟢 Online</h3>
  <div id="online"></div>

  <h3>🏆 Ranking</h3>
  <div id="ranking"></div>

  <h3>📢 Eventos</h3>
  <div id="eventos"></div>

</div>

<script src="script.js"></script>

</body>
</html>
